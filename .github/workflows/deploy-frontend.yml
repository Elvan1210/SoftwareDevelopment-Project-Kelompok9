name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build web
        working-directory: frontend
        run: flutter build web --release

      - name: Prepare Vercel Prebuilt
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/build/web/* .vercel/output/static/
          echo '{"version": 3, "routes": [{"handle": "filesystem"}, {"src": "/(.*)", "dest": "/index.html"}]}' > .vercel/output/config.json

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }} --yes