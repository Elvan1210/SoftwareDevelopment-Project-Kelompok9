version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=rahasia_kelompok9_dev
    volumes:
      - ./backend:/app
      - /app/node_modules
      # Make sure to map firebase credentials locally
      - ./backend/firebase-key.json:/app/firebase-key.json:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
